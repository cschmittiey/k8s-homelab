apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app ha-discord-mute-sensor
spec:
  selector:
    matchLabels:
      app: *app
  template:
    metadata:
      labels:
        app: *app
    spec:
      containers:
      - name: *app
        image: ghcr.io/cschmittiey/ha-discord-mute-sensor:main
        resources:
          limits:
            memory: "128Mi"
            cpu: "300m"
        envFrom:
          - secretRef:
              name: ha-discord-mute-sensor-secret
        # ports:
        # - containerPort: <Port>
